name: Create Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.0.0)'
        required: true
        default: 'v1.0.0'
      notes:
        description: 'Release notes'
        required: false
        default: ''

jobs:
  build-release:
    name: Build Release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2
        with:
          compile-sdk: '36'
          build-tools: '36.0.0'

      - name: Restore keystore from Secrets
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > keystore.jks
            echo "✓ keystore restored"
          else
            echo "WARNING: KEYSTORE_BASE64 not set, release APK will be unsigned"
          fi

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build release APKs (all architectures)
        run: |
          ./gradlew assembleRelease --no-daemon

      - name: List built APKs
        run: ls -lh app/build/outputs/apk/release/

      - name: Upload release APKs
        uses: actions/upload-artifact@v4
        with:
          name: weatherclock-release-apks
          path: app/build/outputs/apk/release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: ${{ inputs.version }}
          body: |
            ## WeatherClock ${{ inputs.version }}

            ### 下载 APK
            | 架构 | 文件 |
            |------|------|
            | 📱 通用 | `app-universal-release.apk` |
            | 🖥️ ARM64 | `app-arm64-v8a-release.apk` |
            | 🔧 ARM32 | `app-armeabi-v7a-release.apk` |
            | 💻 x86_64 | `app-x86_64-release.apk` |
            | 💻 x86 | `app-x86-release.apk` |

            ### 更新内容
            ${{ inputs.notes }}

            ### 安装说明
            - 下载后传输到手机/平板
            - 在设备上点击 APK 安装
            - 首次安装需开启「未知来源」权限
          draft: false
          prerelease: false
          allow_updates: true
          generate_release_notes: false
          files: |
            app/build/outputs/apk/release/app-universal-release.apk
            app/build/outputs/apk/release/app-arm64-v8a-release.apk
            app/build/outputs/apk/release/app-armeabi-v7a-release.apk
            app/build/outputs/apk/release/app-x86_64-release.apk
            app/build/outputs/apk/release/app-x86-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}